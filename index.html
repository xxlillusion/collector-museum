<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vendor Museum — walk card shows in 3D</title>
    <!-- Beta theme fonts (themeKit 'night' + 'lobby' only; 'refined' stays on
         Georgia/system). display=swap so the control theme never blocks. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=Archivo:wght@400;500;600;700;900&family=DM+Serif+Display&family=IBM+Plex+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <meta
      name="description"
      content="A first-person 3D museum for trading-card collections and card shows: hang your collection as framed art, browse vendor binders, and walk real show floor plans before you go."
    />
    <!-- Site-level social cards. SPA caveat: crawlers don't run JS, so every
         route unfurls with these tags; per-page OG needs prerendering or an
         edge function once the app has a deploy target. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Vendor Museum" />
    <meta property="og:title" content="Vendor Museum — walk card shows in 3D" />
    <meta
      property="og:description"
      content="Hang your card collection as framed art, browse vendor inventory binders, and walk real card-show floor plans in first person."
    />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Vendor Museum — walk card shows in 3D" />
    <meta
      name="twitter:description"
      content="Hang your card collection as framed art, browse vendor inventory binders, and walk real card-show floor plans in first person."
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
