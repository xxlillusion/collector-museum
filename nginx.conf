# OG-preview spike (docs/og-previews-spike.md): the `map $http_user_agent
# $is_bot` block would sit HERE, above the server block — this file is
# included at http{} level (conf.d), where map directives are legal.
server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Vite content-hashes everything under /assets — cache forever.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # The SPA shell must revalidate so deploys show up immediately.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # OG-preview spike: a `location ~ ^/(show|vendor|collector|museum)/`
    # branch would go HERE (before the fallback), routing $is_bot traffic to
    # the og-render Supabase Edge Function while humans keep getting the SPA.
    # See docs/og-previews-spike.md — no behavior change until that ships.

    # SPA fallback — deep links like /show/:id resolve to the app shell.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
