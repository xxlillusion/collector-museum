# Per-route OG previews (docs/og-previews-spike.md, phase 1): link-unfurl
# crawlers on shareable routes are redirected to the og-render Supabase Edge
# Function, which serves route-specific meta HTML; humans get the SPA exactly
# as before. This file is included at http{} level (conf.d), where map
# directives are legal.
map $http_user_agent $vm_is_bot {
    default               0;
    ~*facebookexternalhit 1;  # Facebook / Messenger / Instagram
    ~*twitterbot          1;  # X
    ~*slackbot            1;
    ~*discordbot          1;
    ~*linkedinbot         1;
    ~*telegrambot         1;
    ~*whatsapp            1;
    ~*googlebot           1;  # runs JS, but indexing the meta stub beats the empty shell
    ~*bingbot             1;
    ~*pinterest           1;
    ~*redditbot           1;
    ~*vkshare             1;
    ~*w3c_validator       1;
}

server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Vite content-hashes everything under /assets — cache forever.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # The SPA shell must revalidate so deploys show up immediately.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # Shareable routes (/show/:id, /vendor/:id, /collector/:id,
    # /museum/vendor/:id, /museum/collector/:id — the directories /shows and
    # /vendors don't match, they lack the trailing slash segment): bots are
    # 302'd to the og-render Edge Function with the original URI. The major
    # unfurlers (Facebook, X, Slack, Discord, Telegram, WhatsApp, LinkedIn,
    # Google) all follow redirects when unfurling; the redirect keeps nginx
    # free of proxy_pass/resolver/envsubst plumbing (tradeoff notes in
    # docs/og-previews-spike.md §b). Humans fall through to the SPA shell.
    location ~ ^/(show|vendor|collector|museum)/ {
        if ($vm_is_bot) {
            return 302 https://pawtjhjmqzhueuebfnof.supabase.co/functions/v1/og-render?path=$request_uri;
        }
        try_files $uri $uri/ /index.html;
    }

    # SPA fallback — deep links like /show/:id resolve to the app shell.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
